# Dev database. Pinned image, committed dev credentials (dev-only — the
# public instance reads its credentials from the deployment environment).
# `docker compose up -d` and you have Postgres with pgvector on :5433.
# Port 5433 deliberately avoids colliding with any locally installed Postgres.
services:
  db:
    image: pgvector/pgvector:pg17
    container_name: agent-catalog-db
    environment:
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog_dev
      POSTGRES_DB: catalog
    ports:
      - "5433:5432"
    volumes:
      - ./.pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog -d catalog"]
      interval: 2s
      timeout: 2s
      retries: 15
